<!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>InDevelop</title>
        <style>
            *{
                margin: 0;
                padding: 0;
            }
            body{
                background: black;
            }
            main{
                background: #c9c9c9;
                background: url('../img/n.PNG');
                background-repeat: no-repeat;
                background-size: 100% 100%;
                background-attachment: fixed;
                position: absolute;
                width: 99%;
                margin: auto;
                border:3px solid black;
                height: 99%;
            }
            h3{
                /* background: teal; */
                padding: 3px;
            }
            a{
                text-decoration: none;
                background: crimson;
                border-radius: 10px;
                font-size: 30px;
                padding: 10px;
                color: white;
                margin: auto;
                width: 70px;
                display: block;
            }
            a:hover{
                background:linear-gradient(to top,red,crimson,darkred);
                padding: 7px;
                border:3px solid red;
            }
            a:active{
                background: darkred;
            }
            audio{
                display: none;
            }
        </style>
    </head>
    <body>
        <main>
            <h3><a href="components.html">Back</a></h3>
            <audio src="../song/elevedor.mp3" controls autoplay></audio>
        </main>
    </body>
</html>
