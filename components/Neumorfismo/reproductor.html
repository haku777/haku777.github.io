    <title>CodePen - Music Player Neumorphism</title>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Media Player Neumorphism</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    
  <style>
  @import url("https://fonts.googleapis.com/css2?family=Raleway:wght@400;500&display=swap");
  
  :root {
    --background: #e0e5ec;
    --gray: #797d7f;
    --green: #005555;
  }
  
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    font-family: "Raleway", sans-serif;
  }
  
  a{
    text-decoration: none;
    color: crimson;
  }

  img {
    max-width: 100%;
  }
  
  .container {
    background-color: var(--background);
    display: flex;
    padding-top: 70px;
    /* align-items: center; */
    justify-content: center;
    min-height: 100vh;
  }
  
  .player {
    width: 300px;
    height: 550px;
    background-color: var(--background);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6),
      -9px -9px 16px rgba(255, 255, 255, 0.5);
  }
  
  .player__controls {
    display: flex;
    width: 95%;
    justify-content: space-evenly;
    align-items: center;
    margin-bottom: 25px;
  }
  
  .player__btn {
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 
    -8px -8px 20px 0px #fff9, 
    -6px -6px 6px 0px #fff9,
    8px 8px 20px #0001, 
    5px 5px 6px 0px #0001;
    
    color: var(--green);
  }
  .player__btn:hover{
    background: linear-gradient(30deg,white,lightblue,white);
  }

  .player__btn:active {
    box-shadow: inset -8px -8px 20px #fff9, inset -5px -5px 6px #fff9,
      inset 8px 8px 20px #0003, inset 5px 5px 6px #0001;
  }
  
  .player__btn--small {
    min-width: 50px;
    min-height: 50px;
  }
  
  .player__title {
    font-weight: 600;
    font-size: 0.8em;
    color: #a1a1a1;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0;
  }
  
  .player__album {
    width: 150px;
  }
  
  .player__img {
    border-radius: 50%;
    box-shadow: 2px 2px 7px rgb(163, 177, 198), -2px -2px 7px rgb(163, 177, 198),
      -8px -8px 50px rgba(255, 255, 255, 0.8), 3px 3px 25px rgba(0, 0, 0, 0.6);
  }
  
  .player__artist {
    font-size: 1.2em;
    font-weight: 500;
    opacity: 0.5;
    margin: 20px 0px 0px 0px;
  }
  
  .player__song {
    position: relative;
    width: 100%;
    text-align: center;
    font-weight: 400;
    font-size: 1em;
    opacity: 0.5;
    margin: 0;
  }
  
  .player__level {
    width: 80%;
    -webkit-appearance: none;
    outline: none;
    border: none;
    padding: 0;
    margin-top: 40px;
  }
  
  .player__level::-webkit-slider-runnable-track {
    background-color: #d7dbdd;
    height: 6px;
    border-radius: 3px;
  }
  
  .player__level::-webkit-slider-thumb {
    -webkit-appearance: none;
    border-radius: 100%;
    background-color: #5c87fe;
    height: 18px;
    width: 18px;
    margin-top: -7px;
  }
  
  .audio-duration {
    /* margin-top: -30px; */
    display: flex;
    width: 78%;
    font-size: 10px;
    font-weight: 600;
    color: #a1a1a1;
    letter-spacing: 1px;
  }
  
  .start {
    flex: 1;
  }
  
  .player__audio {
    visibility: hidden;
  }
  
  .player__btn--medium {
    min-height: 70px;
    min-width: 70px;
  }
  
  .blue {
    background-color: #5c87fe;
    color: #fff;
  }
  
  .hide {
    display: none;
  }
  </style>
  
    <script>
    window.console = window.console || function(t) {};
  </script>
  
    
    
    <script>
    if (document.location.search.match(/type=embed/gi)) {
      window.parent.postMessage("resize", "*");
    }
  </script>
  
  
  </head>
  
  <body>
    <div class="container">
     <div class="player">

      <div class="player__controls">

        <div class="player__btn player__btn--small" id="previous" style="padding: 10px;border-radius: 3px;">
          <i class="fas fa-chevron-circle-left"><a href="../components.html">&nbsp;&nbsp;&nbsp;Back</a></i>
        </div>
        
        <div class="player__btn player__btn--small" id="previous" style="padding: 10px;border-radius: 3px;">
          <i class="fas fa-angle-double-left"><a href="../../page.html">&nbsp;&nbsp;&nbsp;Menu</a></i>
        </div>
      </div>

       <div class="player__controls">
        

        <div class="player__btn player__btn--small" id="previous">
           <i class="fas fa-arrow-left"></i>
         </div>
         <h5 class="player__title">playing now</h5>
         <div class="player__btn player__btn--small" id="icon-menu">
           <i class="fas fa-bars"></i>
         </div>
       </div>
       <div class="player__album">
         <!-- <img src="https://i.ibb.co/ZS3wRSh/cover.jpg" alt="Album Cover" class="player__img" loading="lazy"> -->
         <img src="../../img/akali.PNG" alt="">
       </div>
  
       <h2 class="player__artist">Halo</h2>
       <h3 class="player__song">(original)</h3>
  
       <input type="range" value="0" min="0" class="player__level" id="range">
       <div class="audio-duration">
         <div class="start">00:00</div>
         <div class="end">03:33</div>
       </div>
  
       <audio class="player__audio" controls="" id="audio" autoplay loop>
         <!-- <source src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/308622/Leo%20-%20Trying.mp3" type="audio/mpeg"> -->
          <source src="../../song/halo-theme-song-original-2m252s.mp3">
       </audio>
  
       <div class="player__controls">
         <div class="player__btn player__btn--medium" id="backward">
           <i class="fas fa-backward"></i>
         </div>
  
         <div class="player__btn player__btn--medium blue play" id="play">
           <i class="fas fa-play play-btn"></i>
           <i class="fas fa-pause pause-btn hide"></i>
         </div>
  
         <div class="player__btn player__btn--medium" id="forward">
           <i class="fas fa-forward"></i>
         </div>
       </div>
     </div>
   </div>
      <script src="https://cpwebassets.codepen.io/assets/common/stopExecutionOnTimeout-157cd5b220a5c80d4ff8e0e70ac069bffd87a61252088146915e8726e5d9f147.js"></script>
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jcarousel/0.3.1/jquery.jcarousel.min.js"></script>
        <script id="rendered-js">
  const audio = document.getElementById("audio");
  const playPause = document.getElementById("play");
  
  playPause.addEventListener("click", () => {
    if (audio.paused || audio.ended) {
      playPause.querySelector(".pause-btn").classList.toggle("hide");
      playPause.querySelector(".play-btn").classList.toggle("hide");
      audio.play();
    } else {
      audio.pause();
      playPause.querySelector(".pause-btn").classList.toggle("hide");
      playPause.querySelector(".play-btn").classList.toggle("hide");
    }
  });
  //# sourceURL=pen.js
      </script>
  
 
  </body>
  </html>
