<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        main{
            background: #252555;
            height: 100vh;
            overflow: hidden;
        }
        section{
            background: black;
            width: 70%;
            display: flex;
            flex-wrap: wrap;
            height: 50vh;
            margin: auto;
            margin-top: 10vh;overflow: hidden;
            color: white;
            padding: 20px;
        }
        .alert{
            font-size: 12rem;
            text-align: center;
            width: 100%;
            margin: auto;
        }
        audio{
            display: hide;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <div class="alert" id="alert">
            </div>
        </section>
    </main>

<script>
    
    let alert = document.querySelector("#alert");
    
    function validarHora(){
        let hora = new Date();
        if ((hora.getHours()== 8 && hora.getMinutes() == 0) || 
            (hora.getHours()== 8 && hora.getMinutes() == 0) || 
            (hora.getHours()== 15 && hora.getMinutes() > 58) || 
            (hora.getHours()== 18 && hora.getMinutes() == 0)){

            alert.innerHTML = `
            <audio autoplay="true" src="../../song/drop-it-3-2-1-audiotrimmer.mp3">
            </audio><br><p>Daily</p>`;
        }else{
            alert.innerHTML =("<p>Wait... : " + hora.getHours() + ":" + hora.getMinutes() + ":" + hora.getSeconds() + "</p>")
        }
    }
    
    let interval = setInterval(validarHora,20000);

</script>
</body>
</html>
