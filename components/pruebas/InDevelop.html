<!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>InDevelop</title>
        <style>
            *{
                margin: 0;
                padding: 0;
            }
            body{
                background: black;
            }
            main{
                background: url('../../img/error2.PNG');
                background-size: 100% 100%;
                width: 70%;
                margin: auto;
                height: 800px;
            }
            h3{
                /* background: teal; */
                padding: 3px;
            }
            a{
                text-decoration: none;
                background: crimson;
                border-radius: 10px;
                font-size: 30px;
                padding: 10px;
                color: white;
                margin: auto;
                width: 70px;
                display: block;
            }
            a:hover{
                background:linear-gradient(to top,red,crimson,darkred);
                padding: 7px;
                border:3px solid red;
            }
            a:active{
                background: darkred;
            }
            audio{
                display: none;
            }
            @media(max-width:750px){
                main{
                    height: 450px;
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <h3><a href="../index.html">Back</a></h3>
        <main>
            <audio src="../../song/elevedor.mp3" controls autoplay></audio>
        </main>
    </body>
</html>
