<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body{
			height: 100vh;
		}
		@font-face{
			font-family: ram;
			src: url(../../font/magneto-bold/magneto-bold.ttf);			
		}

		main{
			background: linear-gradient(#03a9f4 50%,white 50% 100%);
			justify-content: space-evenly;
			height: 100vh;
			padding-top: 10vh;
		}
		aside{
			background: url(../../img/posillo/one.png);
			background-position: center;
			background-repeat: no-repeat;
			background-size: 25% 100%;
			width: 100%;
			height: 15vh;

		}
		section{
			width: 100%;
			display: flex;
			justify-content: space-evenly;
		}
		div{
			background-position: center;
			padding: 20px;
			width: 450px;
			height: 50vh;
			border-radius: 10px;
			backdrop-filter:  blur(15px);
			border-top: 1px solid rgba(255,255,255,0.5);
			box-shadow: 0px 15px 25px rgba(0,0,0,0.1);
		}

		div div:nth-child(1){
			background: url(../../img/posillo/skin.jpg);
			background-position: center;
			background-size: 170% 120%;
			background-repeat: no-repeat;
			width: 400px;
			height: 45vh;
		}

		div:nth-child(2) div:nth-child(1){
			background: url(../../img/posillo/Emblem_Challenger.png);
			background-position: cover;
			background-size: 100% 90%;
			background-repeat: no-repeat;
		}
		div:nth-child(3) div:nth-child(1){
			background: url(../../img/posillo/pentakill.png);
			background-size: 100% 77%;
			background-repeat: no-repeat;
			padding-top: 35px;

		}
		div:nth-child(3) div:nth-child(1) img{
			width: 77px;
			height: 77px;
			border-radius: 50%;
		}
		div:nth-child(3) div:nth-child(1) h2{
			font-size: 3rem;
			padding-top: 25vh;
		}

		main section img{
			display: block;
			margin: auto;
			width: 270px;
			height: 360px;
			border-radius: 10px;
		}

		h2{
			font-family: ram,serif;
			text-align: center;
			padding-top: -10px;
			color: dodgerblue;
			letter-spacing: 17px;
		}

	</style>
</head>
<body>
	<main>
	<aside></aside>
		<section>
			<div>
				<div></div>
			</div>
			<div>
				<div>		
				</div>
			</div>
			<div>
				<div>
					<img src="../../img/posillo/yo.jpeg" alt="">
					<h2>HAKU</h2>
				</div>
			</div>
		</section>
	</main>
</body>
</html>
