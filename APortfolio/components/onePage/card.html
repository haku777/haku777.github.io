<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Card</title>

	<style>
		@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,300;1,400&display=swap');

		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Josefin Sans', sans-serif;
		}
		
		body{
			background: #333;
			height: 100vh;
			overflow: hidden;
		}
		
		main{
			background: #000;
			margin: auto;
			width: 70vw;
			height: 100vh;
		}

		main div{
			background: indigo;
			position: absolute;
			border:3px solid tan;
			margin: auto;
			width: 300px;
			height: 400px;
			inset: -3px;
		}

	</style>

</head>
<body>
	<main>
		<div></div>
	</main>
</body>
</html>
