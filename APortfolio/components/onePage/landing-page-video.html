<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="../../../img/information/c.png" type="image/x-icon">
	<title>Landing Page - video background</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,300;1,400&display=swap');
		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Josefin Sans', sans-serif;
			font-size: 1.2rem;
			font-weight: 700;	
		}
		body{
			background: #000;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
		}
		.wrapper{
			background: #0007;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
		}

		.wrapper video{
			position: absolute;
			width: 100%;
			height: auto;
			top: 0;
			left: 0;
			bottom: 0;
			z-index: -1;
		}
		header{
			position: absolute;
			top: 0;
			width: 100vw;
			overflow: hidden;
			z-index: 10;
		}

		header nav{
			background: #0007;
			display: flex;
			height: 70px;
			padding: 0px 7vw;
			justify-content: space-between;
			align-items: center;
		}
		
		header nav ul{
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
		}

		header nav ul li{
			list-style: none;
			padding: 7px 10px;
			color: #fff;
		}
		
		header nav ul li:hover{
			background: linear-gradient(transparent 90%, #fff 90% 100%);
			cursor: pointer;
		}

		header img{
			width: 3vw;
			height: 3vw;
			border-radius:50%;
		}

		section{
			position: absolute;
			top: 60vh;
			width: 100vw;
		}

		section a{
			border: 3px solid #fff;
			border-radius: 30px;
			display: block;
			padding: 20px;
			transition: .7s;
			margin: auto;
			width: 217px;
			color: #fff;
			text-decoration: none;
			text-align: center;
		}

		section a:hover{
			background: #fefefe;
			color: #252525;
			cursor: pointer;
		}

	</style>
</head>
<body>
	<div class="wrapper">
		<video autoplay loop muted playsinline>
			<source src="../../../img/video/binaryCode.mp4" type="video/mp4">
			<source src="movie.ogg" type="video/ogg">
		</video> 

		<header>
			<nav>
				<img src="../../../img/utilities/yo4.avif" alt="landing page logo">
				<ul>
					<li>Inicio</li>
					<li>Servicios</li>
					<li>Ayuda</li>
				</ul>
			</nav>
		</header>

		<section>
			<h1><a href="../../new.html">Landing Page</a></h1>
		</section>
	</div>
</body>
</html>
