<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shorcut icon" href="../../../img/utilities/yo4.avif" />
    <title>Emojis</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            padding: 0 7px;
            font-family: 'Noto Sans JP', sans-serif;
            color: #fff;
        }
        .steps{
            background: #d43454;
            width: 70vw;
            height: 47px;
            margin: auto;
            display: flex;
            align-items: center;
            margin-bottom: 7px;
            padding: 0px 17px;
            font-size: 3vh;
            overflow: scroll;
        }
        main {
            width: 97vw;
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            font-size: 1.7vh;
            overflow: hidden;
        }
        p{
            color: crimson;
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <h2>Emojis</h2><p>In Develop</p>
    <p>&#10140</p>
    <div class="steps" id="steps"></div>
    <main id="main"></main>
</body>

<script>
    
    var steps = document.getElementById("steps");
    var main = document.getElementById("main");

    (()=>{
        let count = 50;

        for(var i = 1; i < count + 1; i++){
            steps.innerHTML += "<code>" + i + "</code>&nbsp;";
        }
        
        for(var i = 127000; i < 130000; i++){
            main.innerHTML += "<div class='"+ i +"'>&#" + i + " </div>";
        }
    })();
</script>
</html>
