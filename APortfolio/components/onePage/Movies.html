<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@600&display=swap" rel="stylesheet">
    <title>Movies</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: url(../../../img/movies/mario.jpg) #000;
            font-family: 'Noto Sans JP', sans-serif;
            background-size: 50% 100%;
            background-position: right;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 7vw;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container{
            background: linear-gradient(to right,#000 50%,transparent);
            width: 100vw;
            height: 100vh;
        }

        .nab{
            background: #dc143c77;
            width: 100vw;
            height: 10vh;
        }

        .nab{
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            overflow: hidden;
        }

        .menu{
            background: #00808077;
            width: 70%;
            height: 10vh;
            padding: 7px;
            display: flex;
            align-content: center;
            align-items: center;
        }

        .menu .logo{
            background: #3cffb8;
            padding: 17px;
            font-size: 2rem;
            text-shadow: 1px 1px #777;
            text-transform: uppercase;
        }
        
        ul li{
            list-style: none;
            display: none;
        }

        .text{
            width: 100vw;
            height: 90vh;
            display: flex;
            padding: 7vw;
            flex-direction: column;
            justify-content: center;
            align-items: left;
            text-align: left;
        }

        .text button{
            background: #fd0050;
            font-size: 1.7rem;
            color: #fff;
            border: none;
            width: 27vh;
            height: 7vh;
        }

        .h2 {
            text-align: center;
        }
        code{
            margin-top: 7vh;
            font-size: 2rem;
            color: crimson;
        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <div class="nab">
                <div class="menu">
                    <h2 class="logo">Movies</h2>
                    <nav>
                        <ul>esto
                            <li>esto</li>
                            <li>esto</li>
                            <li>esto</li>
                            <li>esto</li>
                        </ul>
                        <ul>esrto</ul>
                    </nav>
                </div>
                <div class="search">
                    <img src="" alt="search">
                    <ul>
                        <li>language</li>
                    </ul>
                    <img src="" alt="campana">
                    <img src="" alt="user">
                </div>
            </div>
            <div class="text">
                <h2>Movies</h2>
                <p>all movies</p>
                <button>Watch Trailer</button>
                <code>In Develop</code>
            </div>
        </div>
    </main>
</body>
</html>
