<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>

    <link rel="stylesheet" href="bootstrap/bootstrap.css"><!--Bootstrap 5-->

    <style>
        .container{padding: 20px;}
        button{margin: 7px;}
        a{
            text-decoration: none; color: white;
        }
        .carousel{background: black;}
        .Containercarouselq{width: 30% !important;height: 100% !important;margin: auto;background: black; overflow: hidden;}

    </style>
</head>
<body>

    <main>
<!-- carousel -->
    <div class="carousel">
        <div class="Containercarouselq">
            <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
                <ol class="carousel-indicators">
                    <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
                    <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
                    <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
                </ol>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img class="d-block w-100" src="../../img/flowers.jpg" alt="First slide">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="../../img/lol.PNG" alt="Second slide">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="../../img/akali.PNG" alt="Third slide">
                    </div>
                </div>
                <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="sr-only">Previous</span>
                </a>
                <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="sr-only">Next</span>
                </a>
            </div>
        </div>
    </div>
    
    
    
    


<!-- cards -->
        <div class="container"> 
            <button class="btn btn-danger"><a href="../index.html">Back</a></button>
            <button class="btn btn-danger"><a href="../../page.html">Menu</a></button>
            
            <div class="card" style="width:400px">
                <div class="card-body">
                    <h4 class="card-title">Akali</h4>
                    <p class="card-text">Ejemplo de card con bootstrap</p>
                    <a href="#" class="btn btn-primary">Ver perfil</a>
                </div>
                <img class="card-img-bottom" src="../../img/akali.PNG" alt="Card image" style="width:100%">
            </div>
        </div>
</main>


      <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha2/js/bootstrap.min.js"></script>
</body>
</html>
